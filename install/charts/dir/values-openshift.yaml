#
# OpenShift-specific overrides for the Directory Service Helm chart.
#
# This file contains all the values needed to deploy the Directory Service
# on an OpenShift cluster with SPIFFE/SPIRE mTLS and GitHub authentication
# via the Envoy auth gateway.
#
# Prerequisites:
#   - SPIRE deployed on the cluster (server, agent, CSI driver, controller manager)
#   - TLS certificate secret created for the Envoy gateway
#   - OCI registry credentials generated (htpasswd)
#
# Usage:
#   helm install dir-release ./install/charts/dir \
#     -n agent-directory --create-namespace \
#     -f install/charts/dir/values-openshift.yaml \
#     --set apiserver.secrets.ociAuth.username=<OCI_USERNAME> \
#     --set apiserver.secrets.ociAuth.password=<OCI_PASSWORD> \
#     --set-file apiserver.zot.secretFiles.htpasswd=<HTPASSWD_FILE> \
#     --set apiserver.secrets.syncAuth.username=<SYNC_USERNAME> \
#     --set apiserver.secrets.syncAuth.password=<SYNC_PASSWORD> \
#     --set apiserver.secrets.postgresAuth.password=<DB_PASSWORD>
#
# See docs/openshift-install.md for the full step-by-step guide.

apiserver:
  image:
    pullPolicy: Always
    # Remove default pull secret reference (not needed for public images)
    pullSecrets: []

  # OpenShift uses Routes, not NodePort
  service:
    type: ClusterIP

  # OpenShift Route for direct gRPC access to the apiserver.
  # Disabled by default when envoyAuthz is enabled, because external traffic
  # flows through the Envoy gateway instead.
  # Enable this (and disable envoyAuthz) if you want direct gRPC access without
  # the GitHub auth layer.
  route:
    enabled: false
    # host: dir-api.<your-cluster-domain>
    annotations: {}
    tls:
      termination: edge
      insecureEdgeTerminationPolicy: Redirect

  # -------------------------------------------------------------------------
  # Authentication and Authorization
  # -------------------------------------------------------------------------
  # Enable SPIFFE-based mTLS authentication and Casbin authorization policies.
  # Requires SPIRE to be deployed and spire.enabled=true below.
  config:
    authn:
      enabled: true
      # SPIRE agent socket path — must match the filename provided by the
      # SPIFFE CSI driver. Check with a debug pod:
      #   oc run debug --image=busybox --restart=Never --overrides='...' -- ls /run/spire/agent-sockets/
      # Common values: api.sock (upstream SPIRE), spire-agent.sock (managed SPIRE operators)
      socket_path: "unix:///run/spire/agent-sockets/<YOUR-SOCKET-FILENAME>"
    authz:
      enabled: true
    # Point apiserver at the Helm-deployed PostgreSQL service.
    # Format: <release-name>-postgresql
    database:
      postgres:
        host: "<RELEASE-NAME>-postgresql"

  # Authorization policies (Casbin CSV format).
  # The first rule grants full access to workloads from your SPIRE trust domain.
  # Additional rules grant public read access to specific API methods.
  #
  # Replace <YOUR-TRUST-DOMAIN> with the trust domain configured in your
  # SPIRE server (see Step 1 in docs/openshift-install.md).
  authz_policies_csv: |
    p,<YOUR-TRUST-DOMAIN>,*
    p,*,/agntcy.dir.store.v1.StoreService/Pull
    p,*,/agntcy.dir.store.v1.StoreService/Push
    p,*,/agntcy.dir.store.v1.StoreService/PullReferrer
    p,*,/agntcy.dir.store.v1.StoreService/Lookup
    p,*,/agntcy.dir.search.v1.SearchService/SearchCIDs
    p,*,/agntcy.dir.search.v1.SearchService/SearchRecords
    p,*,/agntcy.dir.sync.v1.SyncService/RequestRegistryCredentials

  # -------------------------------------------------------------------------
  # SPIRE / SPIFFE Configuration
  # -------------------------------------------------------------------------
  # Connects to an existing SPIRE instance on the cluster.
  # The SPIFFE CSI driver mounts the workload API socket into each pod.
  spire:
    enabled: true

    # Trust domain of your SPIRE server.
    # Find it with:
    #   kubectl get configmap -n <spire-namespace> spire-server -o yaml | grep trust_domain
    trustDomain: "<YOUR-TRUST-DOMAIN>"

    # Must match the SPIRE controller manager's className.
    # Find it with:
    #   oc get clusterspiffeids -o yaml | grep className
    # Set to "none" to omit the field entirely (for classless SPIRE controllers).
    className: "<YOUR-SPIRE-CLASS-NAME>"

    # Restrict ClusterSPIFFEID to the deployment namespace.
    # Required when the SPIRE controller manager uses namespace-scoped matching.
    namespaceSelector:
      matchExpressions:
      - key: kubernetes.io/metadata.name
        operator: In
        values:
        - "<NAMESPACE>"

    # DNS SANs added to the SPIFFE X.509-SVID certificate.
    # This should match the externally reachable hostname of the apiserver.
    # Format: <release-name>-apiserver-<namespace>.<cluster-domain>
    dnsNameTemplates:
      - "<RELEASE-NAME>-apiserver-<NAMESPACE>.<YOUR-CLUSTER-DOMAIN>"

  # Disable nginx Ingress — OpenShift uses Routes instead.
  oasf:
    ingress:
      enabled: false

  # -------------------------------------------------------------------------
  # Reconciler
  # -------------------------------------------------------------------------
  # Ensure HOME is writable — OpenShift's restricted SCC assigns a random
  # non-root UID that cannot write to /. Some containers attempt to create
  # directories under $HOME on startup, which fails without this override.
  extraEnv:
    - name: HOME
      value: /tmp

  reconciler:
    image:
      repository: ghcr.io/agntcy/dir-reconciler
      tag: latest
      pullPolicy: Always
    # Point reconciler at the Helm-deployed PostgreSQL service.
    config:
      database:
        postgres:
          host: "<RELEASE-NAME>-postgresql"

  # -------------------------------------------------------------------------
  # PostgreSQL
  # -------------------------------------------------------------------------
  # The Bitnami PostgreSQL subchart auto-detects OpenShift and adapts its
  # security contexts via global.compatibility.openshift.adaptSecurityContext.
  # No manual UID overrides are needed.
  #
  # Database credentials should be passed via --set flags (see Usage above).
  # postgresql:
  #   auth:
  #     password: "<set-via-cli>"

  # -------------------------------------------------------------------------
  # Envoy Auth Gateway
  # -------------------------------------------------------------------------
  # Enables the Envoy proxy with ext_authz for external authentication.
  # External clients authenticate via OIDC tokens (Dex, GitHub Actions, etc.);
  # Envoy then speaks SPIFFE mTLS to the Directory apiserver backend.
  envoyAuthz:
    enabled: true

  envoy-authz:
    envoy:
      backend:
        # Internal service address of the apiserver.
        # Format: <release-name>-apiserver.<namespace>.svc.cluster.local
        address: "<RELEASE-NAME>-apiserver.<NAMESPACE>.svc.cluster.local"
        port: 8888

      # OIDC/JWT filter configuration.
      # Enable the providers that match your identity setup.
      # Dex: set dex.enabled=true and configure the issuer/JWKS endpoints.
      # GitHub Actions OIDC: set github.enabled=true for CI/CD workflows.
      # Disable both if using only ext_authz with GitHub PATs.
      oidc:
        dex:
          enabled: false
        github:
          enabled: false

      spiffe:
        enabled: true
        # Must match apiserver.spire.trustDomain above.
        trustDomain: "<YOUR-TRUST-DOMAIN>"
        # Must match apiserver.spire.className above.
        className: "<YOUR-SPIRE-CLASS-NAME>"
        # SPIRE agent socket path inside the CSI mount (must match the filename
        # provided by your cluster's SPIFFE CSI driver).
        socketPath: "/run/spire/agent-sockets/<YOUR-SOCKET-FILENAME>"
        # Must match apiserver.spire.namespaceSelector above.
        namespaceSelector:
          matchExpressions:
          - key: kubernetes.io/metadata.name
            operator: In
            values:
            - "<NAMESPACE>"

      # TLS termination on the Envoy listener.
      # Required for OpenShift passthrough routes (gRPC requires HTTP/2,
      # which OpenShift's HAProxy router only passes through via TLS).
      tls:
        enabled: true
        # Name of the Kubernetes TLS secret containing tls.crt and tls.key.
        # Create this before running helm install (see Step 4 in the guide).
        secretName: "envoy-tls-cert"

    authServer:
      image:
        tag: v1.1.0

      # OIDC RBAC configuration.
      # Define roles and users that can access the Directory.
      # User format depends on your OIDC provider:
      #   - Dex:            "user:<issuer-url>:<email>"
      #   - GitHub Actions: "ghwf:repo:<org>/<repo>:workflow:<name>:ref:<ref>:env:<env>"
      #   - Machine/client: "client:<issuer-url>:<client-id>"
      oidc:
        roles:
          admin:
            allowedMethods:
              - "*"
            users:
              - "<YOUR-OIDC-USER>"

    # OpenShift Route for the Envoy gateway.
    # Uses TLS passthrough so Envoy handles TLS termination directly.
    route:
      enabled: true
      # Uncomment to set a specific hostname (otherwise OpenShift auto-generates one):
      # host: dir-gateway.<your-cluster-domain>
      annotations: {}
      tls:
        termination: passthrough

    # OpenShift-compatible security contexts.
    # Do not set runAsUser or fsGroup — OpenShift's restricted SCC assigns
    # UIDs automatically from the namespace's UID range.
    # Explicitly null out runAsUser and fsGroup to override base chart defaults.
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: null
      fsGroup: null
    securityContext:
      allowPrivilegeEscalation: false
      runAsNonRoot: true
      runAsUser: null
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL
